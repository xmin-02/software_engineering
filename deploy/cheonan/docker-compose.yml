services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cheonan-api:latest
    container_name: cheonan-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./config:/app/config:ro
    environment:
      - DISABLE_SCHEDULER=1
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3001/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
